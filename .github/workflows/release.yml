# Manual release: builds Windows NSIS installer + Android debug APK, uploads to a GitHub Release.
# Run: Actions → Release → Run workflow → enter version (e.g. 1.2.0).

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver, e.g. 1.2.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  build-pc:
    name: PC (Windows installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pc/package-lock.json

      - name: Set package version
        run: npm pkg set version=${{ github.event.inputs.version }} --prefix pc

      - name: Install & build NSIS installer
        working-directory: pc
        run: |
          npm ci
          npm run dist:installer

      - name: Verify installer output
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}"
          $setup = "pc/dist/BSLink-Setup-$v.exe"
          Get-ChildItem -Path pc/dist -ErrorAction SilentlyContinue | Format-Table -AutoSize
          if (-not (Test-Path -LiteralPath $setup)) {
            throw "Expected installer not found: $setup (check artifactName in package.json build.nsis)"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: pc-installer
          path: pc/dist/BSLink-Setup-${{ github.event.inputs.version }}.exe
          if-no-files-found: error

  build-android:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Android SDK packages
        run: |
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "platform-tools"
          yes | sdkmanager --licenses || true

      - name: local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.2.1'

      - name: assembleDebug
        working-directory: android
        run: |
          gradle assembleDebug --no-daemon \
            -PciVersionName=${{ github.event.inputs.version }} \
            -PciVersionCode=${{ github.run_number }}

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk "BSLink-Android-${{ github.event.inputs.version }}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: BSLink-Android-${{ github.event.inputs.version }}.apk
          if-no-files-found: error

  publish:
    name: Create GitHub Release
    needs: [build-pc, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pc-installer
          path: assets

      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: assets

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: BSLink ${{ github.event.inputs.version }}
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            assets/BSLink-Setup-${{ github.event.inputs.version }}.exe
            assets/BSLink-Android-${{ github.event.inputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
